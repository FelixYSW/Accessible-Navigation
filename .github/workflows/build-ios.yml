# ─────────────────────────────────────────────────────────────────────────────
# build-ios.yml
#
# GitHub Actions workflow: Unsigned iOS Release Build → .ipa artifact
#
# Trigger: push to main/master, or manual dispatch.
# Runner:  macos-14 (Apple Silicon, ships with Xcode 15 & 16 side-by-side)
#
# Caching strategy (3 layers):
#   1. Node modules   — keyed on package-lock.json hash
#   2. CocoaPods      — keyed on Podfile.lock hash (generated after prebuild)
#   3. Xcode DerivedData — keyed on source hash for incremental compilation
#
# Output: AccessibleNav.ipa uploaded as a workflow artifact (7 day retention).
#         The .ipa is unsigned and can be installed via Sideloadly.
# ─────────────────────────────────────────────────────────────────────────────

name: "iOS Release Build (Unsigned)"

on:
  push:
    branches: [main, master]
  workflow_dispatch:          # Allow manual trigger from the GitHub Actions UI

# Cancel in-progress runs on the same branch to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node version — kept in sync with .node-version / .nvmrc if present
  NODE_VERSION: "20"
  # Xcode scheme and workspace (generated by expo prebuild)
  XCODE_SCHEME: "AccessibleNav"
  XCODE_WORKSPACE: "ios/AccessibleNav.xcworkspace"
  # Derived data destination (cached between runs)
  DERIVED_DATA_PATH: "${{ github.workspace }}/ios/build"
  # App archive path
  ARCHIVE_PATH: "${{ github.workspace }}/ios/build/AccessibleNav.xcarchive"
  # Google API key — set this in GitHub repo Settings → Secrets → Actions
  # Name the secret: EXPO_PUBLIC_GOOGLE_API_KEY
  EXPO_PUBLIC_GOOGLE_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_API_KEY }}

jobs:
  build:
    name: "Build Unsigned .ipa"
    runs-on: macos-14           # Apple Silicon runner with Xcode 15/16

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1        # Shallow clone for speed

      # ── 2. Select Xcode version ──────────────────────────────────────────
      # macos-14 runner ships with Xcode 15.4 as the latest available version.
      # See: https://github.com/actions/runner-images/blob/main/images/macos/macos-14-Readme.md
      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # ── 3. Set up Node.js with npm cache ─────────────────────────────────
      #    actions/setup-node built-in cache handles ~/.npm for us.
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"          # Caches ~/.npm keyed on package-lock.json

      # ── 4. Install Node dependencies ─────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci --prefer-offline

      # ── 5. TypeScript type-check ──────────────────────────────────────────
      #    Runs BEFORE prebuild so TS errors surface quickly without waiting
      #    for the full Xcode compile (saves ~10-15 min on failures).
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── 6. Expo prebuild (generates ./ios Xcode project) ─────────────────
      #    We run this BEFORE restoring the CocoaPods cache because prebuild
      #    generates the Podfile whose hash we use as the cache key.
      - name: Expo prebuild (generate iOS project)
        run: npx expo prebuild --clean --platform ios --non-interactive
        env:
          # Prevent Expo from prompting for EAS credentials
          EXPO_NO_DOTENV: "1"
          # Suppress analytics in CI
          EXPO_NO_TELEMETRY: "1"

      # ── 6. Restore CocoaPods cache ────────────────────────────────────────
      #    Key includes the Podfile.lock hash so cache invalidates on any
      #    dependency version change. Falls back to a prefix match.
      - name: Cache CocoaPods
        id: cocoapods-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            cocoapods-${{ runner.os }}-

      # ── 7. Install CocoaPods ─────────────────────────────────────────────
      #    Skip `pod install` if cache was a perfect hit to save ~2-4 min.
      - name: Install CocoaPods dependencies
        if: steps.cocoapods-cache.outputs.cache-hit != 'true'
        run: |
          cd ios
          pod install --repo-update
        env:
          # Silence pod install progress output (reduces log noise)
          CP_DISABLE_ANSI: "true"

      # ── 8. Restore Xcode DerivedData cache ───────────────────────────────
      #    Key includes source file hash for incremental compilation.
      #    The restore key falls back to any prior DerivedData for this OS.
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: derived-data-${{ runner.os }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'ios/**/*.swift', 'ios/**/*.m', 'ios/**/*.h') }}
          restore-keys: |
            derived-data-${{ runner.os }}-

      # ── 9. Build archive (unsigned, no code signing) ─────────────────────
      #    CODE_SIGNING_ALLOWED=NO and CODE_SIGN_IDENTITY="" tell Xcode to
      #    skip all code-signing steps. This allows the build to succeed on
      #    a runner that has no Apple Developer certificates installed.
      - name: Build Xcode archive (unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "${{ env.XCODE_WORKSPACE }}" \
            -scheme     "${{ env.XCODE_SCHEME }}" \
            -configuration Release \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            -derivedDataPath "${{ env.DERIVED_DATA_PATH }}" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE="" \
            | xcbeautify --quiet 2>/dev/null || true

          # xcbeautify may not be installed; fall back to raw output if so.
          if [ ! -d "${{ env.ARCHIVE_PATH }}" ]; then
            echo "::error::Archive not found at ${{ env.ARCHIVE_PATH }}"
            exit 1
          fi
          echo "✅ Archive created at ${{ env.ARCHIVE_PATH }}"

      # ── 10. Package archive into a Sideloadly-compatible .ipa ────────────
      #     Standard .ipa structure: Payload/<AppName>.app inside a zip.
      #     The .app bundle lives inside the .xcarchive at Products/Applications/
      - name: Package .ipa
        run: |
          APP_PATH=$(find "${{ env.ARCHIVE_PATH }}/Products/Applications" \
            -maxdepth 1 -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in archive."
            exit 1
          fi

          echo "Found .app at: $APP_PATH"

          # Build Payload directory (required .ipa structure)
          mkdir -p "${{ github.workspace }}/Payload"
          cp -r "$APP_PATH" "${{ github.workspace }}/Payload/"

          # Create the .ipa (zip archive of Payload/)
          cd "${{ github.workspace }}"
          zip -r AccessibleNav.ipa Payload/

          # Verify output
          ls -lh AccessibleNav.ipa
          echo "✅ AccessibleNav.ipa created ($(du -sh AccessibleNav.ipa | cut -f1))"

      # ── 11. Upload .ipa as workflow artifact ──────────────────────────────
      - name: Upload AccessibleNav.ipa
        uses: actions/upload-artifact@v4
        with:
          name: "AccessibleNav-${{ github.sha }}"
          path: AccessibleNav.ipa
          retention-days: 7
          if-no-files-found: error

      # ── 12. Post-build summary ────────────────────────────────────────────
      - name: Build summary
        if: success()
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | \`AccessibleNav-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| IPA Size | $(du -sh AccessibleNav.ipa | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install via Sideloadly**: download the artifact zip, extract \`AccessibleNav.ipa\`, and sideload onto your device." >> $GITHUB_STEP_SUMMARY
